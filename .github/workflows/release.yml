name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag, for example v0.3.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate tag format
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release metadata
        run: pnpm run smoke

      - name: Verify source quality
        run: |
          pnpm run typecheck
          pnpm run check
          pnpm run check:boundaries
          pnpm run test:frontend
          pnpm run build

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$RELEASE_TAG" != "v$PACKAGE_VERSION" ]]; then
            echo "Tag $RELEASE_TAG does not match package version v$PACKAGE_VERSION"
            exit 1
          fi

  release:
    name: Build (${{ matrix.settings.platform }})
    needs: preflight
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.settings.platform }}
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
          pkg-config --modversion gdk-3.0

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch Cargo dependencies
        working-directory: src-tauri
        run: cargo fetch --locked

      - name: Extract changelog
        run: pnpm exec vite-node scripts/extract-changelog.ts
        env:
          GITHUB_REF_NAME: ${{ env.RELEASE_TAG }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Aurona Code ${{ env.RELEASE_TAG }}
          assetNamePattern: AuronaCode-v[version]-[arch][setup][ext]
          args: ${{ matrix.settings.args }}
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: true
          prerelease: false
