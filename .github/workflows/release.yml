name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''
    runs-on: ${{ matrix.settings.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
          
      - name: Install dependencies (Ubuntu only)
        if: matrix.settings.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          
      - name: Install frontend dependencies
        run: npm install
        
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Aurona Code ${{ github.ref_name }} 发布'
          assetNamePattern: 'AuronaCode-v[version]-[arch][setup][ext]'
          args: ${{ matrix.settings.args }}
          releaseBody: |
            
            <更新内容填写于此暂时代替>
            
            ---
            
            ### 系统要求与下载指引
            
            本版本为全平台提供自动化构建产物，请从下方 **Assets** 列表中选择适合您系统的安装包：
            
            * **Windows 客户端**：请下载 `.msi` 或 `.exe` 文件（仅支持 Windows 10/11，不支持 Windows 7）
            * **macOS 客户端**：请下载 `.dmg` 文件
            * **Linux 客户端**：请下载 `.AppImage` 或 `.deb` 文件
            
            > **提示**：Aurona Code 持续致力于提供极速、安全的轻量化开发体验。如果您在当前版本遇到问题，欢迎前往 Issues 提交反馈
          releaseDraft: true
          prerelease: false
