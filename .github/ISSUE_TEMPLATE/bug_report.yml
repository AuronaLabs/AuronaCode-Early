name: 提交 Bug
description: 提交错误报告以协助我们改进 Aurona Code
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您抽出时间填写这份 Bug 报告！
        *Aurona Code 目前正处于早期 Alpha 阶段，所以偶尔出现 Bug 是正常的。我们极其感激您能协助我们追踪并消灭它们！*
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 请清晰且简明地描述该 Bug 是什么。
      placeholder: 请在此处描述您遇到的问题...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 能够触发此异常行为的具体步骤。
      placeholder: |
        1. 打开 '...'
        2. 点击 '....'
        3. 向下滚动到 '....'
        4. 发现报错
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 请清晰地描述您原本期望发生什么。
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Aurona Code 版本号
      description: 您正在使用哪个版本的 Aurona Code？（例如 0.0.3）
      placeholder: 0.0.x
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      description: 您正在什么操作系统上运行 Aurona Code？
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 相关的日志或截图 (可选)
      description: 如果可能的话，请添加截图或控制台日志来帮助说明您的问题。
