name: 提交缺陷
description: 提交缺陷报告以协助我们改进 Aurona Code
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您抽出时间填写这份缺陷报告
        Aurona Code 目前正处于早期开发阶段，我们会尽快追踪并修复这些问题
  - type: textarea
    id: description
    attributes:
      label: 缺陷描述
      description: 请清晰且简明地描述该缺陷是什么
      placeholder: 请在此处描述您遇到的问题...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 能够触发此异常行为的具体步骤
      placeholder: |
        1 打开 ...
        2 点击 ....
        3 向下滚动到 ....
        4 发现报错
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 请清晰地描述您原本期望发生什么
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Aurona Code 版本号
      description: 您正在使用哪个版本（例如 0.0.5）
      placeholder: 0.0.x
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      description: 您正在什么操作系统上运行
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 相关的日志或截图 (可选)
      description: 请添加截图或控制台日志来帮助说明该问题
