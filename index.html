<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurona Code</title>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('aurona-theme') || 'system';
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (theme === 'dark' || (theme === 'system' && prefersDark)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <script>
      // Global ban on webview context menus
      document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
    <div id="Root">
      <style>
        #app-loader {
          position: fixed; inset: 0; background-color: var(--ColorApp, #f1f5f9); display: flex;
          flex-direction: column; align-items: center; justify-content: center; z-index: 99999;
          font-family: 'HarmonyOS Sans SC', 'Microsoft YaHei', sans-serif;
          user-select: none; /* Prevent text selection */
        }
        .loader-spinner {
          width: 44px; height: 44px; animation: rotate 2s linear infinite; margin-bottom: 24px;
        }
        .loader-spinner .path {
          stroke: #2563eb;
          stroke-linecap: round;
          animation: dash 1.5s ease-in-out infinite;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes dash {
          0% { stroke-dasharray: 1, 150; stroke-dashoffset: 0; }
          50% { stroke-dasharray: 90, 150; stroke-dashoffset: -35; }
          100% { stroke-dasharray: 90, 150; stroke-dashoffset: -124; }
        }
        #fatal-error {
          display: none;
          flex-direction: column; align-items: center; justify-content: center;
          text-align: center; padding: 20px; color: #ef4444; font-family: sans-serif;
        }
      </style>
      <div id="app-loader">
        <svg class="loader-spinner" viewBox="0 0 50 50">
          <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="8"></circle>
        </svg>
        <div style="height: 24px; overflow: hidden; color: #64748b; font-size: 14px; font-weight: 500;">
          <div style="height: 24px; display: flex; align-items: center; justify-content: center; white-space: nowrap;">
            正在前往 Aurona Code 的路上
          </div>
        </div>
      </div>
      <div id="fatal-error">
        <svg style="width:64px;height:64px;margin-bottom:16px;" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
          <path d="M12 9v2m0 4v.01" />
          <path d="M5 19h14a2 2 0 0 0 1.84 -2.75l-7.1 -12.25a2 2 0 0 0 -3.5 0l-7.1 12.25a2 2 0 0 0 1.75 2.75" />
        </svg>
        <h2 style="font-size: 24px; font-weight: bold; margin-bottom: 8px;">引擎致命崩溃</h2>
        <p id="fatal-error-msg" style="color: #64748b; font-size: 14px; font-family: monospace; max-width: 80%; word-break: break-all;"></p>
      </div>
    </div>
    
    <script>
      // Global error catcher for module execution failures
      window.addEventListener('error', function(e) {
        var loader = document.getElementById('app-loader');
        if (loader) loader.style.display = 'none';
        
        var errContainer = document.getElementById('fatal-error');
        if (errContainer) errContainer.style.display = 'flex';
        
        var errMsg = document.getElementById('fatal-error-msg');
        if (errMsg) errMsg.innerText = e.message || String(e.error);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var loader = document.getElementById('app-loader');
        if (loader) loader.style.display = 'none';
        
        var errContainer = document.getElementById('fatal-error');
        if (errContainer) errContainer.style.display = 'flex';
        
        var errMsg = document.getElementById('fatal-error-msg');
        if (errMsg) errMsg.innerText = e.reason ? String(e.reason) : "Unhandled Promise Rejection";
      });
    </script>
    <script type="module" src="/Src/App/Main.tsx"></script>
  </body>
</html>
